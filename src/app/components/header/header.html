<header class="main-header">
  <div class="logo">
    <a routerLink="">MAISON ILARIA</a>
  </div>
  
  <nav class="nav-links">
    <a routerLink="" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
    <a routerLink="prodotti" routerLinkActive="active">Collezione</a>
    <!-- Nuovi link editoriali della Maison -->
    <a routerLink="chi-siamo" routerLinkActive="active">Chi Siamo</a>
    <a routerLink="contatti" routerLinkActive="active">Contatti</a>
  </nav>
  
  <div class="cart-icon">
    <!-- Percorsi relativi senza la barra iniziale / -->
    <a routerLink="preferiti" style="margin-right: 2rem;">
      ♥ Preferiti <span class="badge" *ngIf="getWishlistCount() > 0">{{ getWishlistCount() }}</span>
    </a>
    
    <a routerLink="carrello">
      🛒 Carrello <span class="badge" *ngIf="getCartCount() > 0">{{ getCartCount() }}</span>
    </a>
  </div>
</header>
