<div class="catalog-container">
  <header class="catalog-header">
    <span>Maison Ilaria Archive</span>
    <h2>La Collezione Permanente</h2>
    <p>Linee essenziali, geometrie pure e textures naturali.</p>
    
    <!-- Nuova Barra di Ricerca Editoriale della Maison -->
    <div class="search-container">
      <input 
        type="text" 
        [(ngModel)]="searchTerm" 
        (input)="onSearchChange()" 
        placeholder="Cerca nella collezione...">
    </div>

    <!-- Barra dei Filtri Elegante della Maison -->
    <div class="filter-bar">
      <button (click)="filterByCategory('Tutti')" [class.active]="selectedCategory === 'Tutti'">Tutti</button>
      <button (click)="filterByCategory('Donna')" [class.active]="selectedCategory === 'Donna'">Donna</button>
      <button (click)="filterByCategory('Uomo')" [class.active]="selectedCategory === 'Uomo'">Uomo</button>
      <button (click)="filterByCategory('Accessori')" [class.active]="selectedCategory === 'Accessori'">Accessori</button>
    </div>
  </header>
  
  <!-- Griglia dei Prodotti Filtrati (Aggiornata con filteredProducts) -->
  <div class="products-grid">
    <div *ngFor="let product of filteredProducts" class="product-card">
      <div class="image-wrapper">
        <img [src]="product.image" [alt]="product.name">
        <div class="card-overlay">
          <a [routerLink]="['/prodotto', product.id]" class="btn-view">Vedi Dettaglio</a>
        </div>
      </div>
      <div class="product-info">
        <span class="category">{{ product.category }}</span>
        <h3>{{ product.name }}</h3>
        <p class="price">{{ product.price | currency:'EUR' }}</p>
      </div>
    </div>
  </div>

  <!-- Messaggio se la ricerca testuale non trova nessun capo d'abbigliamento -->
  <div *ngIf="filteredProducts.length === 0" style="text-align: center; padding: 4rem 0; color: #888888; font-weight: 300; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; letter-spacing: 1px;">
    Nessun capo corrisponde alla ricerca corrente.
  </div>
</div>
